<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Resume Parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Анимированные фоновые элементы */
        .bg-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 12s infinite alternate;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(80px, 80px) scale(1.3); opacity: 0.7; }
        }

        .orb-1 { top: -200px; left: -150px; background: #4f46e5; }
        .orb-2 { bottom: -200px; right: -150px; background: #ec4899; animation-delay: -3s; }

        .register-container {
            max-width: 520px;
            width: 100%;
            z-index: 2;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo i {
            font-size: 3rem;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 1.8rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #1e1b4b, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Стилизация Django форм */
        .register-card form p {
            margin-bottom: 1.2rem;
        }

        .register-card label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #0f172a;
            font-size: 0.85rem;
        }

        .register-card input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .register-card input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .helptext {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.3rem;
            display: block;
        }

        .errorlist {
            color: #dc2626;
            font-size: 0.75rem;
            list-style: none;
            margin-top: 0.3rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px #4f46e5;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
        }

        .login-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            color: #ec4899;
        }

        /* Messages */
        .message {
            padding: 0.8rem;
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            border-left: 4px solid #ef4444;
        }

        .success-message {
            background: #dcfce7;
            color: #15803d;
            border-left: 4px solid #22c55e;
        }

        @media (max-width: 550px) {
            .register-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <i class="fas fa-file-alt"></i>
                <h1>Resume Parser</h1>
                <p style="color: #64748b; font-size: 0.85rem;">AI-система обработки резюме</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                        <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>

            <div class="login-link">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти в систему →</a>
            </div>
        </div>
    </div>
</body>
</html>
