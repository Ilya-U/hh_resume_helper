<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Resume Parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #020617 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79,70,229,0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.2); }
        }

        .bg-1 { top: -250px; left: -200px; }
        .bg-2 { bottom: -250px; right: -200px; background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, transparent 70%); animation-delay: -3s; }

        .login-container {
            max-width: 460px;
            width: 100%;
            z-index: 2;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand i {
            font-size: 3rem;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand h2 {
            font-size: 1.8rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #1e1b4b, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Стилизация Django формы */
        .login-card form p {
            margin-bottom: 1.3rem;
        }

        .login-card label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #0f172a;
            font-size: 0.85rem;
        }

        .login-card input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .login-card input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .errorlist {
            color: #dc2626;
            font-size: 0.75rem;
            list-style: none;
            margin-top: 0.3rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px #4f46e5;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
        }

        .register-link a {
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            color: #ec4899;
        }

        .message {
            padding: 0.8rem;
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            background: #fee2e2;
            color: #b91c1c;
            border-left: 4px solid #ef4444;
        }

        @media (max-width: 480px) {
            .login-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="animated-bg bg-1"></div>
    <div class="animated-bg bg-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <i class="fas fa-file-alt"></i>
                <h2>Resume Parser</h2>
                <p style="color: #64748b; margin-top: 5px;">Войдите в панель управления</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="message">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right-to-bracket"></i> Войти
                </button>
            </form>

            <div class="register-link">
                Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться →</a>
            </div>
        </div>
    </div>
</body>
</html>
